<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página Responsiva</title>
  <link rel="stylesheet" href="styles.css">
<style>
/* Estilos básicos */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  line-height: 1.6;
}

header {
  background: #6200ea;
  color: white;
  padding: 1rem;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 1rem;
  text-decoration: none;
  font-weight: bold;
}

.hero {
  background: #bb86fc;
  color: white;
  padding: 2rem;
  text-align: center;
}

.content {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 2rem;
}

.card {
  background: #f1f1f1;
  margin: 1rem;
  padding: 2rem;
  flex: 1 1 300px;
  max-width: 300px;
  text-align: center;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

footer {
  background: #6200ea;
  color: white;
  text-align: center;
  padding: 1rem;
  margin-top: 2rem;
}

/* RESPONSIVE: Ajustes para pantallas pequeñas */
@media (max-width: 768px) {
  nav {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  
  .content {
    flex-direction: column;
    align-items: center;
  }
}

</style>

</head>
<body>
  <header>
    <h1>Bienvenido a mi página</h1>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>¡Hola Mundo!</h2>
      <p>Esta es mi primera página responsiva.</p>
    </section>
    <section class="content">
      <div class="card">Contenido 1</div>
      <div class="card">Contenido 2</div>
      <div class="card">Contenido 3</div>
    </section>
  </main>

  <footer>
    <p>© 2025 Mi Página</p>
  </footer>
</body>
</html>
