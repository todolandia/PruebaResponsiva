<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscripción al Curso</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">
<link rel="apple-touch-icon" href="icon-192.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:50px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
opacity:0.8;
margin-bottom:40px;
}

.price{
font-size:50px;
font-weight:700;
margin:20px 0;
color:#00ffae;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin:40px 0;
}

.feature{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:12px;
transition:0.3s;
}

.feature:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.15);
}

.payButton{
display:inline-block;
margin-top:30px;
background:#00c853;
padding:18px 40px;
font-size:20px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.payButton:hover{
transform:scale(1.05);
background:#00e676;
}

.installButton{
display:none;
margin-top:20px;
background:#2962ff;
padding:15px 35px;
font-size:18px;
border-radius:10px;
border:none;
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.installButton:hover{
transform:scale(1.05);
background:#448aff;
}

.secure{
margin-top:20px;
opacity:0.7;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Curso de Robótica</h1>

<p class="subtitle">
Aprende Arduino, sensores, programación y crea proyectos increíbles.
</p>

<div class="price">
$1200 MXN
</div>

<div class="features">

<div class="feature">
🤖 Arduino desde cero
</div>

<div class="feature">
⚡ Electrónica básica
</div>

<div class="feature">
🧠 Programación divertida
</div>

<div class="feature">
🚗 Proyectos reales
</div>

</div>

<a class="payButton" href="https://mpago.la/2UmeB8L" target="_blank">
Inscribirme y pagar
</a>

<br>

<button id="installBtn" class="installButton">
📲 Instalar App CITZapopan
</button>

<p class="secure">
Pago seguro con Mercado Pago • Tarjeta • Débito • OXXO
</p>

</div>

<script>

/* registrar service worker */

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
.then(() => console.log("Service Worker registrado"))
.catch(error => console.log("Error:", error));
}

/* instalación de PWA */

let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {

e.preventDefault();

deferredPrompt = e;

installBtn.style.display = "inline-block";

});

installBtn.addEventListener("click", async () => {

if (!deferredPrompt) return;

deferredPrompt.prompt();

const { outcome } = await deferredPrompt.userChoice;

if (outcome === "accepted") {

console.log("Usuario instaló la app");

}

deferredPrompt = null;

installBtn.style.display = "none";

});

</script>

</body>
</html>
